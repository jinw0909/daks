<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}DAKS 관리자{% endblock %}
    </title>

    <link
            rel="stylesheet"
            href="{{ url_for('admin-static', path='/css/admin.css') }}"
    >
</head>
<body>
<header class="admin-header">
    <a href="/admin" class="admin-logo">
        DAKS Admin
    </a>

    {% if admin %}
    <div class="admin-header-actions">
        <span>{{ admin.name }}님</span>

        <form
                method="post"
                action="/admin/logout"
        >
            <button type="submit">
                로그아웃
            </button>
        </form>
    </div>
    {% endif %}
</header>

<main class="admin-main">
    {% block content %}{% endblock %}
</main>
</body>
</html>
